<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='css/eggy.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/progressbar.css') }}"/>

    <link rel="stylesheet" href="{{ url_for('static',filename='css/index.css') }}">
    {% block header %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
    const prices = document.getElementsByClassName('price')
    for (let i = 0; i < prices.length; i++) {
        const prices = document.getElementsByClassName('price')
for (let i = 0; i < prices.length; i++) {
     let price = prices[i]
     let value = parseInt(price.innerText.replace(/,/g, '').trim())
     if (!isNaN(value)) {
        price.innerText = value.toLocaleString() + " تومان"
     }
}
    }
    const header_menu = document.getElementById('header-menu');
    const change_header_menu = (show) => {
        if (show) {
            header_menu.style.height = header_menu.scrollHeight + "px"
        } else {
            header_menu.style.height = "0"

        }
    }

</script>
<script type="module">
    import {Eggy} from '{{ url_for('static',filename='js/eggy.js') }}';
    {% for m in get_flashed_messages() %}
        Eggy({
            title: 'اطلاعات',
            message: '{{ m }}',
            type: 'info',
            duration: 5000,
        });
    {% endfor %}

</script>
</body>
</html>
