<header>

    <section>
        <a href="/">
            <img src="{{ url_for('static',filename = 'image/logo.png') }}" alt="HADIS">
        </a>
        <div id="header-menu">
            <span id="header-menu-close-btn" onclick="change_header_menu(false)">×</span>
            <form action="/" method="get">
                <input type="search" name="search" value="{{ search if search !=None }}" placeholder="جستجو...">
            </form>
            <a class="header-link" href="/cart">سبد خرید</a>
            {% if current_user.is_authenticated %}
                <a class="header-link" href="/user/dashbard">پل کاربری</a>
            {% else %}
                <a class="header-link" href="/user/login">ورود‌/ ثبت‌ ‌نام</a>
            {% endif %}
            <a class="header-link" href="/about">درباره ما</a>
        </div>
        <img src="{{ url_for('static',filename = 'theme-image/menu.png') }}" id="header-menu-btn"
             onclick="change_header_menu(true)">
    </section>

</header>
